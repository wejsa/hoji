# Dev 개발 서버 환경 설정

spring:
  # H2 Console (Dev에서도 활성화하여 디버깅 지원)
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false  # 외부 접근 차단

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: update  # Dev에서는 스키마 업데이트
    properties:
      hibernate:
        format_sql: true
        show_sql: false  # 파일 로그만 사용

# Actuator - Dev에서는 상세 정보 제공
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized  # 인증된 경우에만 상세 정보
      show-components: when-authorized

# Logging - 적당한 수준의 로깅
logging:
  level:
    root: INFO
    com.hoji: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  file:
    name: logs/hoji-dev.log

# 민감정보 마스킹 - 표준 설정
hoji:
  logging:
    sensitive-headers:
      - authorization
      - cookie
      - set-cookie
      - x-api-key
      - x-auth-token
      - x-csrf-token

# Server
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param  # 파라미터로 제어
    include-exception: false
