# ===================================================================
# 공통 설정 (모든 환경에서 사용)
# 환경별 차이는 application-{profile}.yml 파일 참조
# ===================================================================

spring:
  application:
    name: hoji

  # Graceful Shutdown 설정
  lifecycle:
    timeout-per-shutdown-phase: 30s  # 종료 대기 시간

  # Redis와 RabbitMQ 자동 설정 제외
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

  # H2 Database (공통)
  datasource:
    url: jdbc:h2:mem:hoji
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA (공통 설정)
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        use_sql_comments: true
    open-in-view: false

  # Redis (선택적 - 사용 시 환경별 override 가능)
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # RabbitMQ (선택적 - 사용 시 환경별 override 가능)
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    connection-timeout: 10000
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 1
        retry:
          enabled: true
          initial-interval: 3000
          max-attempts: 3

# Actuator (공통)
management:
  endpoints:
    web:
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true  # Kubernetes liveness/readiness 프로브

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: true

# JWT 인증 설정
jwt:
  # 운영 환경에서는 반드시 환경변수 JWT_SECRET로 256비트 이상의 시크릿을 주입할 것
  secret: ${JWT_SECRET:hoji-local-development-secret-key-please-change-in-production-0123456789}
  access-token-validity-ms: 1800000      # 30분
  refresh-token-validity-ms: 1209600000  # 14일

# Server
server:
  port: 8080
  shutdown: graceful  # 우아한 종료
