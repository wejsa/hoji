# ===================================================================
# 공통 설정 (모든 환경에서 사용)
# 환경별 차이는 application-{profile}.yml 파일 참조
# ===================================================================

spring:
  application:
    name: spring-boot-jwt-starter

  # Graceful Shutdown 설정
  lifecycle:
    timeout-per-shutdown-phase: 30s  # 종료 대기 시간

  # Cache - 로컬 캐시 (Caffeine)
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=10m

  # H2 Database (공통)
  datasource:
    url: jdbc:h2:mem:jwtstarter
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA (공통 설정)
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        use_sql_comments: true
    open-in-view: false

# Actuator (공통)
management:
  endpoints:
    web:
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true  # Kubernetes liveness/readiness 프로브

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: true

# JWT 인증 설정
jwt:
  # 운영 환경에서는 반드시 환경변수 JWT_SECRET로 256비트 이상의 시크릿을 주입할 것
  secret: ${JWT_SECRET:jwt-starter-local-development-secret-key-please-change-in-production-0123456789}
  access-token-validity-ms: 1800000      # 30분
  refresh-token-validity-ms: 1209600000  # 14일

# Server
server:
  port: 8080
  shutdown: graceful  # 우아한 종료
