# ===================================================================
# Production 운영 환경 설정
# ===================================================================

spring:
  h2:
    console:
      enabled: false  # 보안

  jpa:
    hibernate:
      ddl-auto: validate  # 스키마 검증만
    properties:
      hibernate:
        format_sql: false
        show_sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus  # 최소한만 노출
  endpoint:
    health:
      show-details: never  # 보안
      show-components: never
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    root: WARN
    com.hoji: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
  file:
    name: logs/hoji-prod.log

hoji:
  logging:
    sensitive-headers:
      - authorization
      - cookie
      - set-cookie
      - x-api-key
      - x-auth-token
      - x-csrf-token
      - proxy-authorization
      - x-forwarded-for
      - x-real-ip
      - api-key
      - access-token
      - refresh-token

server:
  error:
    include-message: never  # 보안
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false
  compression:
    enabled: true
  http2:
    enabled: true
