# ===================================================================
# Local 개발 환경 설정
# ===================================================================

spring:
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        show_sql: true  # 콘솔 SQL 출력

management:
  endpoints:
    web:
      exposure:
        include: "*"  # 모든 엔드포인트 노출
  endpoint:
    health:
      show-details: always
      show-components: always

logging:
  level:
    root: INFO
    com.hoji: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

hoji:
  logging:
    sensitive-headers:
      - authorization
      - x-api-key
  cors:
    # 로컬 개발 프론트엔드 오리진 (와일드카드 금지)
    allowed-origins:
      - http://localhost:3000
      - http://localhost:8080

server:
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: always
    include-exception: true
